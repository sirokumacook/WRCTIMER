<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODERN WRC TIMER</title>
    <style>
        /* =========================================
           FONTS & TYPOGRAPHY
           ========================================= */
        @font-face {
            font-family: 'WRC_GenEi_Mix';
            src: url('./WRCCleanBold.ttf') format('truetype');
            /* 英語・数字・記号の範囲 */
            unicode-range: U+0020-007E, U+00A0-00FF;
            font-display: swap;
        }
        @font-face {
            font-family: 'WRC_GenEi_Mix';
            src: url('./GenEiLateGoP_v2.ttf') format('truetype');
            /* 日本語の範囲 */
            unicode-range: U+3000-303F, U+3040-309F, U+30A0-30FF, U+FF00-FFEF, U+4E00-9FAF;
            font-display: swap;
        }

        :root {
            --orange: #FF4500;
            --gray-base: #3A4151;
            --gray-light: #5A6273;
            --navy: #1C2233;
            --angle: -18deg; /* 15〜20度の傾き */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* OBS等で抜く場合は適宜変更 */
            font-family: 'WRC_GenEi_Mix', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* =========================================
           UI BANNER / OVERLAY DESIGN
           ========================================= */
        #ui-banner {
            position: fixed;
            bottom: 20px; /* 画面下部 */
            left: 0;
            right: 0;
            height: 120px;
            pointer-events: none; /* UIへの誤クリック防止 */
        }

        /* 左端：オレンジの起点 (Accent Block) */
        .layer-orange {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 320px;
            height: 100px;
            background-color: var(--orange);
            /* 左は垂直、右は斜めカット */
            clip-path: polygon(0 0, 100% 0, calc(100% - 32px) 100%, 0 100%);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
            /* わずかなベベル効果 */
            box-shadow: inset -2px 0 0 rgba(0,0,0,0.15);
        }

        #timer-display {
            font-size: 64px;
            letter-spacing: 2px;
            line-height: 1;
            transform: translateY(2px); /* 視覚的中央調整 */
        }

        /* 中央下層：グレーのベースパネル (Main Body) */
        .layer-gray {
            position: absolute;
            left: 280px; /* オレンジの下に潜り込ませる */
            bottom: 0;
            right: 40px;
            height: 100px;
            /* 薄い光沢のグラデーション（ハイライト） */
            background: linear-gradient(160deg, var(--gray-light) 0%, var(--gray-base) 20%, #2A3141 100%);
            border-bottom-right-radius: 30px;
            z-index: 1;
            /* 多層構造の段差（ベベル効果） */
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.2), inset -1px -1px 2px rgba(0,0,0,0.5);
        }

        /* 中央上層：ネイビーの細長いインセット (Sub Panel) */
        .layer-navy {
            position: absolute;
            top: 0;
            left: 60px;
            width: 400px;
            height: 44px;
            background-color: var(--navy);
            /* 全体のテーマに合わせた右上がりの斜めカット */
            transform: skewX(var(--angle));
            transform-origin: bottom left;
            z-index: 2;
            display: flex;
            align-items: center;
            /* 両端の細いオレンジの斜線（スリット） */
            border-left: 4px solid var(--orange);
            border-right: 4px solid var(--orange);
            /* 彫り込み感 */
            box-shadow: inset 0px -2px 4px rgba(0,0,0,0.6);
        }

        .navy-content {
            /* 親のskewを打ち消す */
            transform: skewX(calc(var(--angle) * -1));
            width: 100%;
            padding: 0 30px;
            font-size: 22px;
            letter-spacing: 3px;
            color: #E2E8F0;
        }

        /* 流れる文字 (Marquee) */
        .marquee-track {
            position: absolute;
            top: 55px;
            left: 80px;
            right: 40px;
            height: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            /* 親のグレーレイヤーに対してクリッピング */
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 18px;
            color: #A0AABF;
            letter-spacing: 2px;
            padding-left: 100%;
            animation: scroll-text 15s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* =========================================
           SETTINGS MODAL & BUTTON
           ========================================= */
        #settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gray-base);
            color: white;
            border: 2px solid var(--gray-light);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            transform: skewX(var(--angle));
            transition: all 0.2s;
        }
        #settings-btn span {
            display: inline-block;
            transform: skewX(calc(var(--angle) * -1));
        }
        #settings-btn:hover {
            background: var(--orange);
            border-color: var(--orange);
        }

        #settings-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #settings-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--navy);
            border-top: 5px solid var(--orange);
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--orange);
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #A0AABF;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--gray-light);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        .flex-inputs {
            display: flex;
            gap: 10px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-row button {
            flex: 1;
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-secondary { background: var(--gray-light); color: white; }

        .hidden-field { display: none !important; }

    </style>
</head>
<body>

    <button id="settings-btn"><span>⚙ SETTINGS</span></button>

    <div id="settings-modal">
        <div class="modal-content">
            <h2>TIMER CONFIGURATION</h2>
            
            <div class="form-group">
                <label>MODE</label>
                <select id="config-mode">
                    <option value="duration">TIMER (MIN / SEC)</option>
                    <option value="target">UNTIL TIME (HH:MM)</option>
                    <option value="clock">CLOCK (CURRENT TIME)</option>
                </select>
            </div>

            <div class="form-group flex-inputs" id="group-duration">
                <input type="number" id="config-min" placeholder="MIN" min="0" value="5">
                <input type="number" id="config-sec" placeholder="SEC" min="0" max="59" value="0">
            </div>

            <div class="form-group hidden-field" id="group-target">
                <input type="time" id="config-target-time" value="12:00">
            </div>

            <div class="form-group">
                <label>TIMER NAME</label>
                <input type="text" id="config-name" placeholder="STAGE 1" value="STAGE 1">
            </div>

            <div class="form-group">
                <label>SCROLLING TEXT</label>
                <input type="text" id="config-marquee" placeholder="AWAITING DEPLOYMENT..." value="NEXT STAGE STARTING SOON">
            </div>

            <div class="btn-row">
                <button class="btn-primary" id="btn-start">START / SAVE</button>
                <button class="btn-secondary" id="btn-close">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="ui-banner">
        <div class="layer-gray">
            
            <div class="layer-navy">
                <div class="navy-content" id="display-name">STAGE 1</div>
            </div>

            <div class="marquee-track">
                <div class="marquee-text" id="display-marquee">NEXT STAGE STARTING SOON</div>
            </div>

        </div>

        <div class="layer-orange">
            <div id="timer-display">00:00</div>
        </div>
    </div>

    <script>
        // =========================================
        // DOM ELEMENTS
        // =========================================
        const modal = document.getElementById('settings-modal');
        const btnSettings = document.getElementById('settings-btn');
        const btnClose = document.getElementById('btn-close');
        const btnStart = document.getElementById('btn-start');
        
        const configMode = document.getElementById('config-mode');
        const groupDuration = document.getElementById('group-duration');
        const groupTarget = document.getElementById('group-target');
        
        const displayTime = document.getElementById('timer-display');
        const displayName = document.getElementById('display-name');
        const displayMarquee = document.getElementById('display-marquee');

        // =========================================
        // STATE & LOCAL STORAGE
        // =========================================
        let timerState = {
            mode: 'duration', // 'duration', 'target', 'clock'
            endTime: 0,       // Absolute timestamp for persistence
            name: 'STAGE 1',
            marquee: 'NEXT STAGE STARTING SOON'
        };

        // ページ読み込み時に保存されたデータを復元
        function loadSettings() {
            const saved = localStorage.getItem('modernWrcTimerData');
            if (saved) {
                timerState = JSON.parse(saved);
                
                // 設定パネルの値を復元
                configMode.value = timerState.mode;
                document.getElementById('config-name').value = timerState.name;
                document.getElementById('config-marquee').value = timerState.marquee;
                
                updateFormVisibility();
                updateStaticDisplay();
            }
        }

        // データを端末に保存
        function saveSettings() {
            timerState.mode = configMode.value;
            timerState.name = document.getElementById('config-name').value;
            timerState.marquee = document.getElementById('config-marquee').value;

            const now = Date.now();

            if (timerState.mode === 'duration') {
                const m = parseInt(document.getElementById('config-min').value) || 0;
                const s = parseInt(document.getElementById('config-sec').value) || 0;
                timerState.endTime = now + (m * 60 + s) * 1000;
            } else if (timerState.mode === 'target') {
                const timeStr = document.getElementById('config-target-time').value;
                if(timeStr) {
                    const [hours, minutes] = timeStr.split(':').map(Number);
                    const target = new Date();
                    target.setHours(hours, minutes, 0, 0);
                    // 過去の時間なら翌日に設定
                    if (target.getTime() < now) {
                        target.setDate(target.getDate() + 1);
                    }
                    timerState.endTime = target.getTime();
                }
            }
            
            localStorage.setItem('modernWrcTimerData', JSON.stringify(timerState));
            updateStaticDisplay();
        }

        // =========================================
        // UI INTERACTIONS
        // =========================================
        btnSettings.addEventListener('click', () => modal.classList.add('active'));
        btnClose.addEventListener('click', () => modal.classList.remove('active'));
        
        btnStart.addEventListener('click', () => {
            saveSettings();
            modal.classList.remove('active');
        });

        configMode.addEventListener('change', updateFormVisibility);

        function updateFormVisibility() {
            const mode = configMode.value;
            groupDuration.classList.toggle('hidden-field', mode !== 'duration');
            groupTarget.classList.toggle('hidden-field', mode !== 'target');
        }

        function updateStaticDisplay() {
            displayName.innerText = timerState.name;
            displayMarquee.innerText = timerState.marquee;
        }

        // =========================================
        // TICK LOGIC (Runs every frame)
        // =========================================
        function formatTime(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatClock(date) {
            const h = date.getHours().toString().padStart(2, '0');
            const m = date.getMinutes().toString().padStart(2, '0');
            const s = date.getSeconds().toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function tick() {
            if (timerState.mode === 'clock') {
                displayTime.innerText = formatClock(new Date());
            } else {
                const remaining = timerState.endTime - Date.now();
                displayTime.innerText = formatTime(remaining);
            }
            requestAnimationFrame(tick);
        }

        // =========================================
        // INITIALIZE
        // =========================================
        loadSettings();
        updateFormVisibility();
        updateStaticDisplay();
        requestAnimationFrame(tick);

    </script>
</body>
</html>
