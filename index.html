<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODERN WRC TIMER - V5</title>
    <style>
        /* =========================================
           FONTS & TYPOGRAPHY
           ========================================= */
        @font-face {
            font-family: 'WRC_GenEi_Mix';
            src: url('./WRCCleanBold.ttf') format('truetype');
            unicode-range: U+0020-007E, U+00A0-00FF;
            font-display: swap;
        }
        @font-face {
            font-family: 'WRC_GenEi_Mix';
            src: url('./GenEiLateGoP_v2.ttf') format('truetype');
            unicode-range: U+3000-303F, U+3040-309F, U+30A0-30FF, U+FF00-FFEF, U+4E00-9FAF;
            font-display: swap;
        }

        :root {
            --orange: #FF4500;
            --gray-base: #3A4151;
            --gray-light: #5A6273;
            --navy: #1C2233;
            --angle: -18deg;
            --ui-width: 800px;
            --ui-scale: 1;
        }

        body {
            margin: 0; padding: 0; background-color: #0d1117;
            font-family: 'WRC_GenEi_Mix', sans-serif; overflow: hidden; color: white;
        }

        /* =========================================
           BACKGROUND SLIDESHOW
           ========================================= */
        .bg-layer {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out; z-index: -10;
        }
        .bg-layer.active { opacity: 1; }

        /* =========================================
           TOP BUTTONS
           ========================================= */
        #top-buttons {
            position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 15px;
        }
        .top-btn {
            background: var(--gray-base); color: white;
            border: 2px solid var(--gray-light); padding: 10px 20px;
            font-family: inherit; font-size: 16px; font-weight: bold; cursor: pointer;
            transform: skewX(var(--angle)); transition: all 0.2s;
        }
        .top-btn span { display: inline-block; transform: skewX(calc(var(--angle) * -1)); }
        .top-btn:hover { background: var(--orange); border-color: var(--orange); }

        /* =========================================
           UI BANNER & CURTAIN DESIGN
           ========================================= */
        #ui-positioner {
            position: fixed; bottom: 0; left: 50%;
            transform: translateX(-50%);
            z-index: 50; pointer-events: none;
        }

        #ui-banner {
            width: var(--ui-width); height: 100px;
            transform: scale(var(--ui-scale)) translateZ(0); /* translateZでハードウェアアクセラレーションを強制しクリッピングを綺麗に */
            transform-origin: bottom center;
            position: relative;
            /* UI全体の角を丸くし、はみ出た部分（カーテン含む）を切り抜く */
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            overflow: hidden; 
        }

        #ui-content-wrapper {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            transition: opacity 0.1s;
        }

        /* オレンジのカーテン（ワイプ演出用） */
        #ui-curtain {
            position: absolute; top: 0; bottom: 0;
            width: 150%; left: -180%; /* 画面外の左からスタート */
            background-color: var(--orange);
            transform: skewX(var(--angle)); z-index: 10;
            /* より滑らかなイージング関数を使用 */
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* 中央下層：グレーのベースパネル */
        .layer-gray {
            position: absolute; left: 290px; bottom: 0;
            width: calc(100% - 290px); height: 100px;
            background: linear-gradient(160deg, var(--gray-light) 0%, var(--gray-base) 20%, #2A3141 100%);
            z-index: 1;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.2), inset -1px 0px 2px rgba(0,0,0,0.5);
        }

        /* 左端：オレンジの起点 */
        .layer-orange {
            position: absolute; left: 0; bottom: 0; width: 320px; height: 100px;
            background-color: var(--orange);
            /* 親要素で丸めているので純粋な斜めカットだけでOK */
            clip-path: polygon(0 0, 100% 0, calc(100% - 32px) 100%, 0 100%);
            z-index: 3; display: flex; align-items: center; justify-content: center;
            padding-right: 20px;
            box-shadow: inset -2px 0 0 rgba(0,0,0,0.15);
        }
        #timer-display {
            position: relative; z-index: 5;
            font-size: 56px; letter-spacing: 2px; line-height: 1; transform: translateY(2px);
        }

        /* 中央上層：ネイビーの細長いインセット */
        .layer-navy {
            position: absolute; top: 15px; left: 40px;
            width: 380px; /* 固定幅に変更 */
            height: 38px;
            background-color: var(--navy); transform: skewX(var(--angle)); transform-origin: bottom left;
            z-index: 2; display: flex; align-items: center;
            border-left: 4px solid var(--orange); border-right: 4px solid var(--orange);
            box-shadow: inset 0px -2px 4px rgba(0,0,0,0.6);
        }

        .navy-content {
            transform: skewX(calc(var(--angle) * -1));
            width: 100%; display: flex;
            justify-content: flex-start; padding-left: 30px;
            align-items: center; font-size: 20px; letter-spacing: 3px; color: #E2E8F0;
        }

        /* 流れる文字 (Marquee) */
        .marquee-track {
            position: absolute; top: 60px; left: 30px; right: 20px; height: 30px;
            overflow: hidden; display: flex; align-items: center;
            /* %ではなく両端30pxの固定値でフェードアウトさせる */
            -webkit-mask-image: linear-gradient(to right, transparent 0px, black 30px, black calc(100% - 30px), transparent 100%);
            mask-image: linear-gradient(to right, transparent 0px, black 30px, black calc(100% - 30px), transparent 100%);
        }

        .marquee-text {
            white-space: nowrap; font-size: 18px; letter-spacing: 2px; color: #FFFFFF;
            padding-left: 100%; animation: scroll-text 15s linear infinite; font-weight: bold;
        }
        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* =========================================
           SETTINGS MODAL
           ========================================= */
        #settings-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 99;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #settings-modal.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--navy); border-top: 5px solid var(--orange);
            padding: 30px; width: 550px; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;
        }

        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: var(--gray-base); }
        .modal-content::-webkit-scrollbar-thumb { background: var(--orange); }

        .modal-content h2 { margin-top: 0; color: var(--orange); letter-spacing: 2px; border-bottom: 1px solid var(--gray-light); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; color: #A0AABF; }
        .form-group input[type="text"], .form-group input[type="number"], .form-group input[type="time"], .form-group select {
            width: 100%; padding: 8px; background: #0d1117; border: 1px solid var(--gray-light); color: white; font-family: inherit; box-sizing: border-box;
        }
        input[type="range"] { width: 100%; accent-color: var(--orange); }
        input[type="file"] { padding: 5px; font-size: 12px; }
        .flex-inputs { display: flex; gap: 10px; }
        
        .section-title { color: white; font-size: 14px; margin: 25px 0 10px 0; padding-left: 10px; border-left: 3px solid var(--orange); }
        .timer-controls-box { background: rgba(0,0,0,0.3); border: 1px solid var(--gray-light); padding: 15px; margin-top: 10px; }

        #bgm-player-ui { display: flex; align-items: center; justify-content: space-between; background: var(--gray-base); padding: 10px; margin-top: 10px; font-size: 14px; }
        #btn-skip-bgm { background: var(--orange); border: none; color: white; padding: 5px 10px; cursor: pointer; font-family: inherit; }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-row button { flex: 1; padding: 10px; font-family: inherit; font-size: 15px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--orange); color: white; }
        .btn-secondary { background: var(--gray-light); color: white; }
        .btn-green { background: #2ea043; color: white; }
        .btn-red { background: #da3633; color: white; }
        .hidden-field { display: none !important; }
    </style>
</head>
<body>

    <div id="bg-1" class="bg-layer active"></div>
    <div id="bg-2" class="bg-layer"></div>

    <div id="top-buttons">
        <button id="toggle-ui-btn" class="top-btn"><span>👁 VISIBILITY</span></button>
        <button id="settings-btn" class="top-btn"><span>⚙ SETTINGS</span></button>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2>CONFIGURATION</h2>
            
            <div class="section-title">TIMER CONTROL</div>
            <div class="timer-controls-box">
                <div class="form-group">
                    <select id="config-mode">
                        <option value="duration">TIMER (HH:MM:SS)</option>
                        <option value="target">UNTIL TIME (HH:MM)</option>
                        <option value="clock">CLOCK (CURRENT TIME)</option>
                    </select>
                </div>
                <div class="form-group flex-inputs" id="group-duration">
                    <input type="number" id="config-hour" placeholder="HH" min="0" value="0">
                    <input type="number" id="config-min" placeholder="MM" min="0" max="59" value="5">
                    <input type="number" id="config-sec" placeholder="SS" min="0" max="59" value="0">
                </div>
                <div class="form-group hidden-field" id="group-target">
                    <input type="time" id="config-target-time" value="12:00">
                </div>
                <div class="form-group">
                    <label>TIMER TITLE</label>
                    <input type="text" id="config-name" value="STAGE 1">
                </div>
                <div class="btn-row">
                    <button class="btn-primary" id="btn-timer-save">SAVE / RESET TIMER</button>
                    <button class="btn-green" id="btn-timer-toggle">▶ START / STOP</button>
                </div>
            </div>

            <div class="section-title">DISPLAY & UI SETTINGS</div>
            <div class="form-group">
                <label><span>UI WIDTH (px)</span> <span id="val-ui-width">800</span></label>
                <input type="range" id="config-ui-width" min="600" max="1600" step="10" value="800">
            </div>
            <div class="form-group">
                <label><span>UI HEIGHT (Scale)</span> <span id="val-ui-scale">1.0</span></label>
                <input type="range" id="config-ui-scale" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
            <div class="form-group">
                <label>MARQUEE TEXT (Scrolling)</label>
                <input type="text" id="config-marquee" value="NEXT STAGE STARTING SOON">
            </div>
            <div class="form-group">
                <label>SCROLL SPEED (Seconds)</label>
                <input type="number" id="config-marquee-speed" value="15" min="1">
            </div>

            <div class="section-title">BACKGROUND IMAGES</div>
            <div class="form-group">
                <label>UPLOAD IMAGES (Multiple allowed)</label>
                <input type="file" id="config-bg-images" multiple accept="image/*">
            </div>
            <div class="form-group">
                <label>SWITCH INTERVAL (Seconds)</label>
                <input type="number" id="config-bg-interval" value="10" min="1">
            </div>

            <div class="section-title">BGM (AUDIO)</div>
            <div class="form-group">
                <label>UPLOAD MP3 (Multiple allowed - Auto Shuffle)</label>
                <input type="file" id="config-bgm" multiple accept="audio/*">
                
                <label style="margin-top: 15px;"><span>VOLUME</span> <span id="val-bgm-volume">50%</span></label>
                <input type="range" id="config-bgm-volume" min="0" max="1" step="0.05" value="0.5">

                <div id="bgm-player-ui">
                    <span style="overflow:hidden; white-space:nowrap; text-overflow:ellipsis; width: 250px;">
                        🎵 <span id="current-bgm-title">No track</span>
                    </span>
                    <button id="btn-skip-bgm" type="button">⏭ SKIP</button>
                </div>
            </div>

            <div class="btn-row" style="margin-top: 30px;">
                <button class="btn-secondary" id="btn-close" style="padding: 15px;">CLOSE SETTINGS</button>
            </div>
        </div>
    </div>

    <div id="ui-positioner">
        <div id="ui-banner">
            <div id="ui-curtain"></div>
            
            <div id="ui-content-wrapper">
                <div class="layer-gray"></div>
                <div class="layer-navy">
                    <div class="navy-content" id="display-name">STAGE 1</div>
                </div>
                <div class="marquee-track">
                    <div class="marquee-text" id="display-marquee"></div>
                </div>
                <div class="layer-orange">
                    <div id="timer-display">00:00:00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================
        // DOM ELEMENTS
        // =========================================
        const modal = document.getElementById('settings-modal');
        const btnSettings = document.getElementById('settings-btn');
        const btnToggleUi = document.getElementById('toggle-ui-btn');
        const btnClose = document.getElementById('btn-close');
        
        const btnTimerSave = document.getElementById('btn-timer-save');
        const btnTimerToggle = document.getElementById('btn-timer-toggle');
        const configMode = document.getElementById('config-mode');
        
        const displayTime = document.getElementById('timer-display');
        const displayName = document.getElementById('display-name');
        const displayMarquee = document.getElementById('display-marquee');

        // =========================================
        // STATE
        // =========================================
        let timerState = {
            mode: 'duration', isRunning: false, remainingMs: 300000, endTime: 0,
            name: 'STAGE 1', marquee: 'NEXT STAGE STARTING SOON', marqueeSpeed: 15,
            uiWidth: 800, uiScale: 1.0, bgInterval: 10, bgmVolume: 0.5
        };
        let uiVisible = true;
        let isWiping = false;

        // =========================================
        // INDEXED DB FOR MEDIA
        // =========================================
        let db;
        let bgImages = [];
        let bgmFiles = [];

        const request = indexedDB.open("WRC_Timer_Media_DB_v2", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("media")) db.createObjectStore("media");
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadMediaFromDB("images", (files) => { bgImages = files; startBgSlideshow(); });
            loadMediaFromDB("bgm", (files) => { 
                bgmFiles = files; 
                if(bgmFiles.length > 0) document.getElementById('current-bgm-title').innerText = `${bgmFiles.length} tracks loaded`;
            });
        };

        async function saveMediaToDB(key, files) {
            if(!db) return;
            const tx = db.transaction("media", "readwrite");
            const store = tx.objectStore("media");
            const fileData = await Promise.all(files.map(async f => {
                const buffer = await f.arrayBuffer();
                return { name: f.name, type: f.type, data: buffer };
            }));
            store.put(fileData, key);
        }

        function loadMediaFromDB(key, callback) {
            if(!db) return callback([]);
            const tx = db.transaction("media", "readonly");
            const req = tx.objectStore("media").get(key);
            req.onsuccess = () => {
                const res = req.result;
                if (res && Array.isArray(res)) {
                    const files = res.map(obj => new File([obj.data], obj.name, {type: obj.type}));
                    callback(files);
                } else callback([]);
            };
        }

        // =========================================
        // SETTINGS & LOGIC
        // =========================================
        function loadSettings() {
            const saved = localStorage.getItem('modernWrcTimerData_v4');
            if (saved) {
                timerState = Object.assign(timerState, JSON.parse(saved));
                configMode.value = timerState.mode;
                document.getElementById('config-name').value = timerState.name;
                document.getElementById('config-marquee').value = timerState.marquee;
                document.getElementById('config-marquee-speed').value = timerState.marqueeSpeed;
                document.getElementById('config-ui-width').value = timerState.uiWidth;
                document.getElementById('config-ui-scale').value = timerState.uiScale || 1.0;
                document.getElementById('config-bg-interval').value = timerState.bgInterval;
                document.getElementById('config-bgm-volume').value = timerState.bgmVolume;
                
                updateFormVisibility(); applyGlobalSettings(); updateTimerToggleBtn();
            }
        }

        function saveGlobalSettings() {
            timerState.marquee = document.getElementById('config-marquee').value;
            timerState.marqueeSpeed = document.getElementById('config-marquee-speed').value || 15;
            timerState.uiWidth = document.getElementById('config-ui-width').value || 800;
            timerState.uiScale = document.getElementById('config-ui-scale').value || 1.0;
            timerState.bgInterval = document.getElementById('config-bg-interval').value || 10;
            timerState.bgmVolume = document.getElementById('config-bgm-volume').value || 0.5;

            localStorage.setItem('modernWrcTimerData_v4', JSON.stringify(timerState));
            applyGlobalSettings();

            // 画像の処理
            const imgInput = document.getElementById('config-bg-images');
            if (imgInput.files.length > 0) {
                bgImages = Array.from(imgInput.files);
                saveMediaToDB("images", bgImages); startBgSlideshow();
                imgInput.value = ''; // 処理後にインプットをリセット
            }
            
            // BGMの処理（ファイルが新たにアップロードされた時のみキューをリセット）
            const bgmInput = document.getElementById('config-bgm');
            if (bgmInput.files.length > 0) {
                bgmFiles = Array.from(bgmInput.files);
                saveMediaToDB("bgm", bgmFiles); bgmQueue = []; playNextBgm();
                bgmInput.value = ''; // これにより設定を閉じても曲が変わらない
            }
        }

        function applyGlobalSettings() {
            document.documentElement.style.setProperty('--ui-width', `${timerState.uiWidth}px`);
            document.documentElement.style.setProperty('--ui-scale', timerState.uiScale);
            document.getElementById('val-ui-width').innerText = timerState.uiWidth;
            document.getElementById('val-ui-scale').innerText = timerState.uiScale;
            
            document.getElementById('val-bgm-volume').innerText = Math.round(timerState.bgmVolume * 100) + '%';
            if (currentAudio) currentAudio.volume = timerState.bgmVolume;

            displayMarquee.innerText = timerState.marquee;
            displayMarquee.style.animationDuration = `${timerState.marqueeSpeed}s`;
            startBgSlideshow();
        }

        // --- TIMER SPECIFIC LOGIC ---
        function saveAndResetTimer() {
            timerState.mode = configMode.value;
            timerState.name = document.getElementById('config-name').value;
            timerState.isRunning = false;

            if (timerState.mode === 'duration') {
                const h = parseInt(document.getElementById('config-hour').value) || 0;
                const m = parseInt(document.getElementById('config-min').value) || 0;
                const s = parseInt(document.getElementById('config-sec').value) || 0;
                timerState.remainingMs = (h * 3600 + m * 60 + s) * 1000;
            } else if (timerState.mode === 'target') {
                const timeStr = document.getElementById('config-target-time').value;
                if(timeStr) {
                    const [hours, minutes] = timeStr.split(':').map(Number);
                    const target = new Date(); target.setHours(hours, minutes, 0, 0);
                    if (target.getTime() < Date.now()) target.setDate(target.getDate() + 1);
                    timerState.endTime = target.getTime();
                    timerState.remainingMs = Math.max(0, timerState.endTime - Date.now());
                }
            }
            displayName.innerText = timerState.name;
            localStorage.setItem('modernWrcTimerData_v4', JSON.stringify(timerState));
            updateTimerToggleBtn();
        }

        function toggleTimer() {
            if (timerState.mode === 'clock') return;
            timerState.isRunning = !timerState.isRunning;

            if (timerState.isRunning) {
                if (timerState.mode === 'duration') timerState.endTime = Date.now() + timerState.remainingMs;
                else if (timerState.mode === 'target' && timerState.endTime < Date.now()) timerState.endTime += 24 * 60 * 60 * 1000;
            } else {
                if (timerState.mode === 'duration') timerState.remainingMs = Math.max(0, timerState.endTime - Date.now());
            }
            localStorage.setItem('modernWrcTimerData_v4', JSON.stringify(timerState));
            updateTimerToggleBtn();
        }

        function updateTimerToggleBtn() {
            if(timerState.mode === 'clock') {
                btnTimerToggle.disabled = true; btnTimerToggle.style.opacity = '0.5'; btnTimerToggle.innerText = "CLOCK MODE";
            } else {
                btnTimerToggle.disabled = false; btnTimerToggle.style.opacity = '1';
                if (timerState.isRunning) {
                    btnTimerToggle.className = 'btn-red'; btnTimerToggle.innerText = "⏸ STOP TIMER";
                } else {
                    btnTimerToggle.className = 'btn-green'; btnTimerToggle.innerText = "▶ START TIMER";
                }
            }
            displayName.innerText = timerState.name;
        }

        function updateFormVisibility() {
            const mode = configMode.value;
            document.getElementById('group-duration').classList.toggle('hidden-field', mode !== 'duration');
            document.getElementById('group-target').classList.toggle('hidden-field', mode !== 'target');
        }

        // =========================================
        // REAL-TIME INPUT LISTENERS
        // =========================================
        document.getElementById('config-ui-width').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--ui-width', `${e.target.value}px`);
            document.getElementById('val-ui-width').innerText = e.target.value;
        });
        document.getElementById('config-ui-scale').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--ui-scale', e.target.value);
            document.getElementById('val-ui-scale').innerText = parseFloat(e.target.value).toFixed(1);
        });
        document.getElementById('config-bgm-volume').addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            document.getElementById('val-bgm-volume').innerText = Math.round(vol * 100) + '%';
            if (currentAudio) currentAudio.volume = vol;
        });

        // =========================================
        // BACKGROUND & BGM LOGIC
        // =========================================
        let currentBgIndex = -1, activeLayer = 1, bgIntervalId = null;
        function switchBg() {
            if (bgImages.length === 0) return;
            currentBgIndex = (currentBgIndex + 1) % bgImages.length;
            const imgUrl = URL.createObjectURL(bgImages[currentBgIndex]);
            if (activeLayer === 1) {
                document.getElementById('bg-2').style.backgroundImage = `url(${imgUrl})`;
                document.getElementById('bg-2').classList.add('active'); document.getElementById('bg-1').classList.remove('active');
                activeLayer = 2;
            } else {
                document.getElementById('bg-1').style.backgroundImage = `url(${imgUrl})`;
                document.getElementById('bg-1').classList.add('active'); document.getElementById('bg-2').classList.remove('active');
                activeLayer = 1;
            }
        }
        function startBgSlideshow() {
            clearInterval(bgIntervalId);
            if(bgImages.length > 0) {
                if(currentBgIndex === -1) switchBg();
                bgIntervalId = setInterval(switchBg, timerState.bgInterval * 1000);
            }
        }

        let bgmQueue = [], currentAudio = null;
        function playNextBgm() {
            if (bgmFiles.length === 0) return;
            if (bgmQueue.length === 0) bgmQueue = [...bgmFiles].sort(() => Math.random() - 0.5);
            
            const file = bgmQueue.shift();
            if (currentAudio) { currentAudio.pause(); currentAudio.src = ""; }
            
            currentAudio = new Audio(URL.createObjectURL(file));
            currentAudio.volume = timerState.bgmVolume;
            currentAudio.onended = playNextBgm;
            currentAudio.play().catch(e => console.log("Waiting for user interaction to play audio."));
            document.getElementById('current-bgm-title').innerText = file.name;
        }

        document.getElementById('btn-skip-bgm').addEventListener('click', playNextBgm);

        // =========================================
        // UI INTERACTIONS
        // =========================================
        btnSettings.addEventListener('click', () => modal.classList.add('active'));
        
        btnClose.addEventListener('click', () => {
            modal.classList.remove('active');
            setTimeout(() => {
                try { saveGlobalSettings(); } catch(e) { console.error("Settings save error:", e); }
                if(bgmFiles.length > 0 && (!currentAudio || currentAudio.paused)) playNextBgm();
            }, 50);
        });

        configMode.addEventListener('change', updateFormVisibility);
        btnTimerSave.addEventListener('click', saveAndResetTimer);
        btnTimerToggle.addEventListener('click', toggleTimer);

        document.body.addEventListener('click', () => {
            if(bgmFiles.length > 0 && (!currentAudio || currentAudio.paused)) playNextBgm();
        }, { once: true });

        // =========================================
        // WIPE CURTAIN ANIMATION (Toggle UI)
        // =========================================
        btnToggleUi.addEventListener('click', () => {
            if(isWiping) return;
            isWiping = true;
            
            const curtain = document.getElementById('ui-curtain');
            const wrapper = document.getElementById('ui-content-wrapper');
            const iconSpan = btnToggleUi.querySelector('span');

            // 1. カーテンを滑らかにかぶせる (Slide in)
            curtain.style.transition = 'left 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            curtain.style.left = '-20%'; 

            setTimeout(() => {
                // 2. カーテンで隠れた瞬間にUIを切り替え
                uiVisible = !uiVisible;
                wrapper.style.opacity = uiVisible ? '1' : '0';
                iconSpan.innerText = uiVisible ? "👁 VISIBILITY" : " VISIBILITY";

                // 3. カーテンを右へ滑らかに逃がす (Slide out)
                curtain.style.left = '120%';

                setTimeout(() => {
                    // 4. アニメーションなしでカーテンを初期位置(左)に戻す
                    curtain.style.transition = 'none';
                    curtain.style.left = '-180%';
                    setTimeout(() => {
                        isWiping = false;
                    }, 50);
                }, 400);
            }, 400);
        });

        // =========================================
        // TICK LOGIC
        // =========================================
        function formatTimeHHMMSS(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.floor(ms / 1000);
            return `${Math.floor(totalSec / 3600).toString().padStart(2, '0')}:${Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0')}:${(totalSec % 60).toString().padStart(2, '0')}`;
        }
        function formatClock(date) {
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;
        }
        function tick() {
            if (timerState.mode === 'clock') displayTime.innerText = formatClock(new Date());
            else {
                if (timerState.isRunning) {
                    const remaining = timerState.endTime - Date.now();
                    timerState.remainingMs = remaining;
                    displayTime.innerText = formatTimeHHMMSS(remaining);
                    if (remaining <= 0) {
                        timerState.isRunning = false; timerState.remainingMs = 0; updateTimerToggleBtn();
                    }
                } else displayTime.innerText = formatTimeHHMMSS(timerState.remainingMs);
            }
            requestAnimationFrame(tick);
        }

        // =========================================
        // INITIALIZE
        // =========================================
        loadSettings();
        requestAnimationFrame(tick);

    </script>
</body>
</html>
