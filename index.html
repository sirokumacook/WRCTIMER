<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODERN WRC TIMER - ADVANCED</title>
    <style>
        /* =========================================
           FONTS & TYPOGRAPHY
           ========================================= */
        @font-face {
            font-family: 'WRC_GenEi_Mix';
            src: url('./WRCCleanBold.ttf') format('truetype');
            unicode-range: U+0020-007E, U+00A0-00FF;
            font-display: swap;
        }
        @font-face {
            font-family: 'WRC_GenEi_Mix';
            src: url('./GenEiLateGoP_v2.ttf') format('truetype');
            unicode-range: U+3000-303F, U+3040-309F, U+30A0-30FF, U+FF00-FFEF, U+4E00-9FAF;
            font-display: swap;
        }

        :root {
            --orange: #FF4500;
            --gray-base: #3A4151;
            --gray-light: #5A6273;
            --navy: #1C2233;
            --angle: -18deg;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            font-family: 'WRC_GenEi_Mix', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* =========================================
           BACKGROUND SLIDESHOW
           ========================================= */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: -10;
        }
        .bg-layer.active {
            opacity: 1;
        }

        /* =========================================
           UI BANNER / OVERLAY DESIGN
           ========================================= */
        #ui-banner {
            position: fixed;
            bottom: 0; /* 画面下に完全にひっつく */
            left: 0;
            width: 760px; /* 横幅を小さく固定 */
            height: 100px;
            pointer-events: none;
        }

        /* 左端：オレンジの起点 */
        .layer-orange {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 260px;
            height: 100px;
            background-color: var(--orange);
            clip-path: polygon(0 0, 100% 0, calc(100% - 32px) 100%, 0 100%);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
            box-shadow: inset -2px 0 0 rgba(0,0,0,0.15);
        }

        #timer-display {
            font-size: 64px;
            letter-spacing: 2px;
            line-height: 1;
            transform: translateY(2px);
        }

        /* 中央下層：グレーのベースパネル */
        .layer-gray {
            position: absolute;
            left: 230px; 
            bottom: 0;
            width: 530px; /* 幅を縮小 */
            height: 100px;
            background: linear-gradient(160deg, var(--gray-light) 0%, var(--gray-base) 20%, #2A3141 100%);
            /* 下ではなく「上の角」を丸くする */
            border-top-right-radius: 30px;
            z-index: 1;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.2), inset -1px 0px 2px rgba(0,0,0,0.5);
        }

        /* 中央上層：ネイビーの細長いインセット */
        .layer-navy {
            position: absolute;
            top: 15px; /* 上部に配置 */
            left: 60px;
            width: 380px;
            height: 38px;
            background-color: var(--navy);
            transform: skewX(var(--angle));
            transform-origin: bottom left;
            z-index: 2;
            display: flex;
            align-items: center;
            border-left: 4px solid var(--orange);
            border-right: 4px solid var(--orange);
            box-shadow: inset 0px -2px 4px rgba(0,0,0,0.6);
        }

        .navy-content {
            transform: skewX(calc(var(--angle) * -1));
            width: 100%;
            padding: 0 30px;
            font-size: 20px;
            letter-spacing: 3px;
            color: #E2E8F0;
        }

        /* 流れる文字 (Marquee) */
        .marquee-track {
            position: absolute;
            top: 60px;
            left: 70px;
            width: 420px;
            height: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            /* 背景の透明度（初期値0、設定で変更可） */
            background-color: rgba(0, 0, 0, 0); 
            border-radius: 4px;
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 18px;
            letter-spacing: 2px;
            padding-left: 100%;
            /* アニメーション秒数はJSで動的変更 */
            animation: scroll-text 15s linear infinite; 
            font-weight: bold;
        }

        @keyframes scroll-text {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* =========================================
           SETTINGS MODAL
           ========================================= */
        #settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gray-base);
            color: white;
            border: 2px solid var(--gray-light);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            transform: skewX(var(--angle));
            transition: all 0.2s;
        }
        #settings-btn span {
            display: inline-block;
            transform: skewX(calc(var(--angle) * -1));
        }
        #settings-btn:hover {
            background: var(--orange);
            border-color: var(--orange);
        }

        #settings-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #settings-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--navy);
            border-top: 5px solid var(--orange);
            padding: 30px;
            width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Scrollbar styles for modal */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: var(--gray-base); }
        .modal-content::-webkit-scrollbar-thumb { background: var(--orange); }

        .modal-content h2 {
            margin-top: 0;
            color: var(--orange);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--gray-light);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #A0AABF;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            background: #0d1117;
            border: 1px solid var(--gray-light);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type="file"] { padding: 5px; font-size: 12px; }

        .flex-inputs { display: flex; gap: 10px; }
        
        .section-title {
            color: white;
            font-size: 14px;
            margin: 25px 0 10px 0;
            padding-left: 10px;
            border-left: 3px solid var(--orange);
        }

        #bgm-player-ui {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--gray-base);
            padding: 10px;
            margin-top: 10px;
            font-size: 14px;
        }
        #btn-skip-bgm {
            background: var(--orange);
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-row button {
            flex: 1;
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-secondary { background: var(--gray-light); color: white; }

        .hidden-field { display: none !important; }
    </style>
</head>
<body>

    <div id="bg-1" class="bg-layer active"></div>
    <div id="bg-2" class="bg-layer"></div>

    <button id="settings-btn"><span>⚙ SETTINGS</span></button>

    <div id="settings-modal">
        <div class="modal-content">
            <h2>CONFIGURATION</h2>
            
            <div class="section-title">TIMER SETTINGS</div>
            <div class="form-group">
                <select id="config-mode">
                    <option value="duration">TIMER (MIN / SEC)</option>
                    <option value="target">UNTIL TIME (HH:MM)</option>
                    <option value="clock">CLOCK (CURRENT TIME)</option>
                </select>
            </div>
            <div class="form-group flex-inputs" id="group-duration">
                <input type="number" id="config-min" placeholder="MIN" min="0" value="5">
                <input type="number" id="config-sec" placeholder="SEC" min="0" max="59" value="0">
            </div>
            <div class="form-group hidden-field" id="group-target">
                <input type="time" id="config-target-time" value="12:00">
            </div>
            <div class="form-group">
                <label>TIMER NAME</label>
                <input type="text" id="config-name" value="STAGE 1">
            </div>

            <div class="section-title">MARQUEE TEXT SETTINGS</div>
            <div class="form-group">
                <label>TEXT</label>
                <input type="text" id="config-marquee" value="NEXT STAGE STARTING SOON">
            </div>
            <div class="form-group">
                <label>TEXT COLORS (Comma separated. e.g: #FFFFFF, #FF4500)</label>
                <input type="text" id="config-marquee-colors" value="#A0AABF, #FFFFFF, #FF4500">
            </div>
            <div class="form-group flex-inputs">
                <div style="flex:1;">
                    <label>SPEED (Seconds)</label>
                    <input type="number" id="config-marquee-speed" value="15" min="1">
                </div>
                <div style="flex:1;">
                    <label>TRACK BG OPACITY (0.0 - 1.0)</label>
                    <input type="number" id="config-marquee-opacity" step="0.1" min="0" max="1" value="0">
                </div>
            </div>

            <div class="section-title">BACKGROUND IMAGES</div>
            <div class="form-group">
                <label>UPLOAD IMAGES (Multiple allowed)</label>
                <input type="file" id="config-bg-images" multiple accept="image/*">
            </div>
            <div class="form-group">
                <label>SWITCH INTERVAL (Seconds)</label>
                <input type="number" id="config-bg-interval" value="10" min="1">
            </div>

            <div class="section-title">BGM (AUDIO)</div>
            <div class="form-group">
                <label>UPLOAD MP3 (Multiple allowed - Auto Shuffle)</label>
                <input type="file" id="config-bgm" multiple accept="audio/*">
                <div id="bgm-player-ui">
                    <span style="overflow:hidden; white-space:nowrap; text-overflow:ellipsis; width: 250px;">
                        🎵 <span id="current-bgm-title">No track</span>
                    </span>
                    <button id="btn-skip-bgm" type="button">⏭ SKIP</button>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-primary" id="btn-start">START / SAVE</button>
                <button class="btn-secondary" id="btn-close">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="ui-banner">
        <div class="layer-gray">
            <div class="layer-navy">
                <div class="navy-content" id="display-name">STAGE 1</div>
            </div>
            <div class="marquee-track" id="display-marquee-track">
                <div class="marquee-text" id="display-marquee"></div>
            </div>
        </div>
        <div class="layer-orange">
            <div id="timer-display">00:00</div>
        </div>
    </div>

    <script>
        // =========================================
        // DOM ELEMENTS
        // =========================================
        const modal = document.getElementById('settings-modal');
        const btnSettings = document.getElementById('settings-btn');
        const btnClose = document.getElementById('btn-close');
        const btnStart = document.getElementById('btn-start');
        const configMode = document.getElementById('config-mode');
        
        const displayTime = document.getElementById('timer-display');
        const displayName = document.getElementById('display-name');
        const displayMarquee = document.getElementById('display-marquee');
        const displayMarqueeTrack = document.getElementById('display-marquee-track');
        const currentBgmTitle = document.getElementById('current-bgm-title');

        // =========================================
        // STATE
        // =========================================
        let timerState = {
            mode: 'duration',
            endTime: 0,
            name: 'STAGE 1',
            marquee: 'NEXT STAGE STARTING SOON',
            marqueeColors: '#A0AABF, #FFFFFF, #FF4500',
            marqueeSpeed: 15,
            marqueeOpacity: 0,
            bgInterval: 10
        };

        // =========================================
        // INDEXED DB FOR MEDIA (Images & BGM)
        // =========================================
        let db;
        let bgImages = [];
        let bgmFiles = [];

        const request = indexedDB.open("WRC_Timer_Media_DB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("media")) {
                db.createObjectStore("media");
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadMediaFromDB("images", (files) => { 
                bgImages = files; 
                startBgSlideshow(); 
            });
            loadMediaFromDB("bgm", (files) => { 
                bgmFiles = files; 
            });
        };

        function saveMediaToDB(key, files) {
            if(!db) return;
            const tx = db.transaction("media", "readwrite");
            tx.objectStore("media").put(files, key);
        }

        function loadMediaFromDB(key, callback) {
            if(!db) return callback([]);
            const tx = db.transaction("media", "readonly");
            const req = tx.objectStore("media").get(key);
            req.onsuccess = () => callback(req.result || []);
        }

        // =========================================
        // SETTINGS LOGIC
        // =========================================
        function loadSettings() {
            const saved = localStorage.getItem('modernWrcTimerData_v2');
            if (saved) {
                timerState = Object.assign(timerState, JSON.parse(saved));
                
                configMode.value = timerState.mode;
                document.getElementById('config-name').value = timerState.name;
                document.getElementById('config-marquee').value = timerState.marquee;
                document.getElementById('config-marquee-colors').value = timerState.marqueeColors;
                document.getElementById('config-marquee-speed').value = timerState.marqueeSpeed;
                document.getElementById('config-marquee-opacity').value = timerState.marqueeOpacity;
                document.getElementById('config-bg-interval').value = timerState.bgInterval;
                
                updateFormVisibility();
                updateStaticDisplay();
            }
        }

        function saveSettings() {
            timerState.mode = configMode.value;
            timerState.name = document.getElementById('config-name').value;
            timerState.marquee = document.getElementById('config-marquee').value;
            timerState.marqueeColors = document.getElementById('config-marquee-colors').value;
            timerState.marqueeSpeed = document.getElementById('config-marquee-speed').value || 15;
            timerState.marqueeOpacity = document.getElementById('config-marquee-opacity').value || 0;
            timerState.bgInterval = document.getElementById('config-bg-interval').value || 10;

            const now = Date.now();
            if (timerState.mode === 'duration') {
                const m = parseInt(document.getElementById('config-min').value) || 0;
                const s = parseInt(document.getElementById('config-sec').value) || 0;
                timerState.endTime = now + (m * 60 + s) * 1000;
            } else if (timerState.mode === 'target') {
                const timeStr = document.getElementById('config-target-time').value;
                if(timeStr) {
                    const [hours, minutes] = timeStr.split(':').map(Number);
                    const target = new Date();
                    target.setHours(hours, minutes, 0, 0);
                    if (target.getTime() < now) target.setDate(target.getDate() + 1);
                    timerState.endTime = target.getTime();
                }
            }
            
            localStorage.setItem('modernWrcTimerData_v2', JSON.stringify(timerState));
            
            // Check File Uploads
            const imgInput = document.getElementById('config-bg-images');
            if (imgInput.files.length > 0) {
                bgImages = Array.from(imgInput.files);
                saveMediaToDB("images", bgImages);
            }
            const bgmInput = document.getElementById('config-bgm');
            if (bgmInput.files.length > 0) {
                bgmFiles = Array.from(bgmInput.files);
                saveMediaToDB("bgm", bgmFiles);
                bgmQueue = []; // Reset queue for new files
            }

            updateStaticDisplay();
            startBgSlideshow();
            
            // Start BGM if not playing
            if(bgmFiles.length > 0 && (!currentAudio || currentAudio.paused)) {
                playNextBgm();
            }
        }

        function updateFormVisibility() {
            const mode = configMode.value;
            document.getElementById('group-duration').classList.toggle('hidden-field', mode !== 'duration');
            document.getElementById('group-target').classList.toggle('hidden-field', mode !== 'target');
        }

        function updateStaticDisplay() {
            displayName.innerText = timerState.name;
            
            // Multi-color Marquee Logic
            const text = timerState.marquee;
            const colors = timerState.marqueeColors.split(',').map(c => c.trim()).filter(c => c);
            if (colors.length === 0) colors.push('#FFFFFF');

            const styledText = text.split('').map((char, i) => {
                const color = colors[i % colors.length];
                return `<span style="color: ${color};">${char}</span>`;
            }).join('');
            
            displayMarquee.innerHTML = styledText;
            displayMarquee.style.animationDuration = `${timerState.marqueeSpeed}s`;
            displayMarqueeTrack.style.backgroundColor = `rgba(0, 0, 0, ${timerState.marqueeOpacity})`;
        }

        // =========================================
        // BACKGROUND SLIDESHOW LOGIC
        // =========================================
        let currentBgIndex = -1;
        let activeLayer = 1;
        let bgIntervalId = null;

        function switchBg() {
            if (bgImages.length === 0) return;
            currentBgIndex = (currentBgIndex + 1) % bgImages.length;
            const imgUrl = URL.createObjectURL(bgImages[currentBgIndex]);

            if (activeLayer === 1) {
                document.getElementById('bg-2').style.backgroundImage = `url(${imgUrl})`;
                document.getElementById('bg-2').classList.add('active');
                document.getElementById('bg-1').classList.remove('active');
                activeLayer = 2;
            } else {
                document.getElementById('bg-1').style.backgroundImage = `url(${imgUrl})`;
                document.getElementById('bg-1').classList.add('active');
                document.getElementById('bg-2').classList.remove('active');
                activeLayer = 1;
            }
        }

        function startBgSlideshow() {
            clearInterval(bgIntervalId);
            if(bgImages.length > 0) {
                switchBg(); // Immediate change
                bgIntervalId = setInterval(switchBg, timerState.bgInterval * 1000);
            }
        }

        // =========================================
        // BGM PLAYER LOGIC
        // =========================================
        let bgmQueue = [];
        let currentAudio = null;

        function playNextBgm() {
            if (bgmFiles.length === 0) return;
            
            // Refill & Shuffle Queue if empty
            if (bgmQueue.length === 0) {
                bgmQueue = [...bgmFiles].sort(() => Math.random() - 0.5);
            }
            
            const file = bgmQueue.shift();
            const url = URL.createObjectURL(file);
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.src = "";
            }
            
            currentAudio = new Audio(url);
            currentAudio.onended = playNextBgm;
            currentAudio.play().catch(e => console.log("Waiting for user interaction to play audio."));
            
            currentBgmTitle.innerText = file.name;
        }

        document.getElementById('btn-skip-bgm').addEventListener('click', () => playNextBgm());

        // =========================================
        // UI INTERACTIONS
        // =========================================
        btnSettings.addEventListener('click', () => modal.classList.add('active'));
        btnClose.addEventListener('click', () => modal.classList.remove('active'));
        configMode.addEventListener('change', updateFormVisibility);
        
        btnStart.addEventListener('click', () => {
            saveSettings();
            modal.classList.remove('active');
        });

        // =========================================
        // TICK LOGIC
        // =========================================
        function formatTime(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        function formatClock(date) {
            const h = date.getHours().toString().padStart(2, '0');
            const m = date.getMinutes().toString().padStart(2, '0');
            const s = date.getSeconds().toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function tick() {
            if (timerState.mode === 'clock') {
                displayTime.innerText = formatClock(new Date());
            } else {
                const remaining = timerState.endTime - Date.now();
                displayTime.innerText = formatTime(remaining);
            }
            requestAnimationFrame(tick);
        }

        // =========================================
        // INITIALIZE
        // =========================================
        loadSettings();
        updateFormVisibility();
        updateStaticDisplay();
        requestAnimationFrame(tick);

    </script>
</body>
</html>
